<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="医学PBL讨论室 - 问题导向学习，支持AI辅助讨论与数据分析">
  <title>医学讨论室 · Medical PBL</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Design Tokens (Super Dev - Healthcare Industry) ===== */
    :root {
      --color-primary: #0D9488;
      --color-primary-hover: #0F766E;
      --color-secondary: #1E40AF;
      --color-accent: #059669;
      --color-danger: #DC2626;
      --color-danger-hover: #B91C1C;
      --color-background: #F0FDFA;
      --color-surface: #FFFFFF;
      --color-surface-elevated: #FFFFFF;
      --color-text: #0F172A;
      --color-text-secondary: #64748B;
      --color-border: #E2E8F0;
      --color-border-light: #F1F5F9;
      --font-display: 'Plus Jakarta Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-body: 'Plus Jakarta Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.08), 0 2px 4px -2px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -4px rgba(15, 23, 42, 0.06);
      --shadow-xl: 0 20px 25px -5px rgba(15, 23, 42, 0.08), 0 8px 10px -6px rgba(15, 23, 42, 0.06);
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--color-background);
      color: var(--color-text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .screen {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
      animation: fadeIn var(--transition-normal) ease;
    }
    .screen.active { display: flex; flex-direction: column; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .card {
      background: var(--color-surface);
      padding: var(--space-2xl);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--color-border-light);
      transition: box-shadow var(--transition-normal);
    }
    .card:hover { box-shadow: var(--shadow-xl); }

    h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: var(--space-lg);
      text-align: center;
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    input, select, button {
      width: 100%;
      padding: var(--space-md);
      margin-bottom: var(--space-md);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      font-family: inherit;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    input:focus, select:focus, button:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
    }

    button {
      background: var(--color-primary);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background var(--transition-fast), transform 0.1s ease;
    }
    button:hover { background: var(--color-primary-hover); }
    button:active { transform: scale(0.98); }
    button.danger {
      background: var(--color-danger);
    }
    button.danger:hover { background: var(--color-danger-hover); }
    button.btn-secondary {
      background: var(--color-secondary);
      width: 100%;
    }
    button.btn-secondary:hover { background: #1E3A8A; }

    .error {
      color: var(--color-danger);
      font-size: 0.8125rem;
      margin-top: calc(var(--space-xs) * -2);
      margin-bottom: var(--space-md);
    }

    .splash {
      background: linear-gradient(135deg, #0D9488 0%, #1E40AF 100%);
    }
    .splash img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .splash-fallback {
      display: none;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      color: #0F172A;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .splash-fallback.show { display: block; }
    .splash img.dissolve-out { animation: dissolve 1s ease-in forwards; }
    @keyframes dissolve { 0% { opacity: 1; filter: none; } 100% { opacity: 0; filter: blur(12px) contrast(0.7) saturate(0.6); } }

    .chat-layout {
      display: flex;
      height: calc(100vh - 60px);
      width: 100%;
      gap: var(--space-md);
      padding: var(--space-md);
    }
    .chat-main {
      flex: 4;
      display: flex;
      flex-direction: column;
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      min-width: 0;
      border: 1px solid var(--color-border-light);
    }
    .chat-layout.no-sidebar .chat-main { flex: 1; }

    .chat-header {
      padding: var(--space-md) var(--space-lg);
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    .chat-header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }
    .ai-toggle-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-right: var(--space-md);
    }
    .ai-toggle-label {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      cursor: pointer;
      font-size: 0.8125rem;
      font-weight: 500;
    }
    .ai-toggle-text { color: rgba(255,255,255,0.95); }
    .ai-toggle-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .ai-toggle-slider {
      position: relative;
      width: 40px;
      height: 22px;
      background: rgba(255,255,255,0.35);
      border-radius: 11px;
      transition: background var(--transition-fast);
    }
    .ai-toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }
    .ai-toggle-input:checked + .ai-toggle-slider {
      background: var(--color-accent);
    }
    .ai-toggle-input:checked + .ai-toggle-slider::before {
      transform: translateX(18px);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-md);
      background: var(--color-background);
    }

    .msg {
      display: flex;
      margin-bottom: var(--space-md);
      gap: var(--space-sm);
      animation: msgSlide 0.25s ease;
    }
    @keyframes msgSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.own { flex-direction: row-reverse; }
    .msg.own .msg-body { background: var(--color-primary); color: #fff; align-items: flex-end; }
    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--color-accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
      font-size: 0.875rem;
    }
    .msg.own .msg-avatar { background: var(--color-primary); }
    .msg.ai .msg-avatar { background: var(--color-secondary); }
    .msg-body {
      max-width: 70%;
      padding: var(--space-md);
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border-light);
    }
    .msg-meta { font-size: 0.75rem; color: var(--color-text-secondary); margin-bottom: var(--space-xs); }
    .msg.own .msg-meta { color: rgba(255,255,255,0.85); }
    .msg-content { word-break: break-word; line-height: 1.55; }
    .msg-time { font-size: 0.6875rem; color: var(--color-text-secondary); margin-top: var(--space-xs); }
    .msg.own .msg-time { color: rgba(255,255,255,0.75); }
    .msg-debug {
      margin-top: 8px;
      padding: 8px;
      border: 1px dashed #CBD5E1;
      border-radius: 8px;
      background: #F8FAFC;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      color: #334155;
      white-space: pre-wrap;
      line-height: 1.35;
    }
    .msg-debug summary {
      cursor: pointer;
      color: #0f766e;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .chat-input-wrap {
      display: flex;
      gap: var(--space-sm);
      padding: var(--space-md);
      border-top: 1px solid var(--color-border-light);
      align-items: flex-end;
      background: var(--color-surface);
    }
    .chat-input {
      flex: 1;
      padding: var(--space-md);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      resize: none;
      min-height: 44px;
    }
    .chat-send, #upload-btn { padding: var(--space-md) var(--space-lg); width: auto; margin: 0; }

    .student-sidebar {
      flex: 1;
      min-width: 200px;
      max-width: 24%;
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--color-border-light);
    }
    .student-sidebar h3 {
      padding: var(--space-md) var(--space-lg);
      background: var(--color-border-light);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text);
    }
    .student-list { flex: 1; overflow-y: auto; padding: var(--space-sm); }
    .student-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md);
      border-bottom: 1px solid var(--color-border-light);
      transition: background var(--transition-fast);
    }
    .student-item:hover { background: var(--color-background); }
    .student-item .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .student-item .info { flex: 1; min-width: 0; }
    .student-item .name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .student-item .id { font-size: 0.75rem; color: var(--color-text-secondary); }
    .student-item input[type="range"] {
      width: 80px;
      accent-color: var(--color-primary);
    }
    
    .scoring-section {
      flex: 1;
      margin-left: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    
    .score-item {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }
    
    .score-item label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text);
    }
    
    .score-controls {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    
    .score-controls input[type="range"] {
      flex: 1;
      min-width: 100px;
    }
    
    .score-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-primary);
      min-width: 60px;
      text-align: right;
    }
    
    .score-value small {
      font-weight: 400;
      color: var(--color-text-secondary);
    }
    
    .score-hint {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      line-height: 1.3;
      margin-top: 2px;
    }

    .score-popup {
      position: fixed;
      background: var(--color-text);
      color: #fff;
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 700;
      z-index: 9999;
      pointer-events: none;
      box-shadow: var(--shadow-lg);
    }
    .score-popup.fade-out { animation: scoreFade 0.5s ease-out forwards; }
    @keyframes scoreFade { to { opacity: 0; transform: translateY(-4px); } }

    .btn-link {
      display: block;
      text-align: center;
      margin-top: var(--space-md);
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition-fast);
    }
    .lobby-divider {
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 0.875rem;
      margin: var(--space-md) 0;
    }
    .btn-link:hover { color: var(--color-primary-hover); text-decoration: underline; }

    .msg-file-link {
      display: inline-block;
      margin-top: var(--space-xs);
      color: var(--color-primary);
      text-decoration: underline;
      cursor: pointer;
    }
    .msg-file-link:hover { color: var(--color-primary-hover); }
    .msg-file-img {
      max-width: 200px;
      max-height: 150px;
      border-radius: var(--radius-md);
      cursor: pointer;
      border: 1px solid var(--color-border);
    }
    .teacher-badge { font-size: 0.75rem; margin-left: var(--space-xs); }
    .card-subtitle {
      font-size: 0.8125rem;
      color: var(--color-text-secondary);
      text-align: center;
      margin-bottom: var(--space-lg);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      animation: modalBgIn 0.2s ease;
    }
    .modal-overlay.show { display: flex; }
    @keyframes modalBgIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--color-border);
      animation: modalSlideIn 0.3s ease;
    }
    @keyframes modalSlideIn { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    .modal-header {
      padding: var(--space-lg) var(--space-xl);
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    .modal-body { padding: var(--space-xl); overflow-y: auto; flex: 1; }

    .modal-tabs {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
    }
    .modal-tab {
      padding: var(--space-sm) var(--space-md);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all var(--transition-fast);
    }
    .modal-tab:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .modal-tab.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    .analysis-section { display: none; }
    .analysis-section.active { display: block; animation: fadeIn 0.2s ease; }

    .analysis-table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--space-md) 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--color-border);
    }
    .analysis-table th, .analysis-table td {
      border: 1px solid var(--color-border-light);
      padding: var(--space-md);
      text-align: left;
    }
    .analysis-table th {
      background: var(--color-border-light);
      font-weight: 600;
      font-size: 0.8125rem;
    }

    .chart-wrap { max-width: 420px; height: 260px; margin: var(--space-lg) 0; }
    .analysis-card {
      background: var(--color-background);
      padding: var(--space-lg);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-lg);
      border: 1px solid var(--color-border-light);
    }
    .analysis-card h4 {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: var(--space-md);
      color: var(--color-text);
    }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-lg); }
    .stat-item {
      padding: var(--space-md);
      background: var(--color-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border-light);
    }
    .stat-label { font-size: 0.75rem; color: var(--color-text-secondary); display: block; margin-bottom: var(--space-xs); }
    .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--color-primary); display: block; }
    .stat-desc { font-size: 0.6875rem; color: var(--color-text-secondary); margin-top: var(--space-xs); display: block; }

    /* 服务器记录保存提示卡片 */
    .record-download-card {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      padding: var(--space-lg);
      max-width: 360px;
      z-index: 10001;
      animation: slideInRight 0.3s ease;
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100%); }
      to { opacity: 1; transform: translateX(0); }
    }
    .record-download-card.success {
      border-left: 4px solid var(--color-accent);
    }
    .record-download-card.warning {
      border-left: 4px solid #F59E0B;
    }
    .record-download-card h3 {
      margin: 0 0 var(--space-md) 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text);
    }
    .record-download-card p {
      margin: 0 0 var(--space-md) 0;
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      line-height: 1.5;
    }
    .record-download-card .btn-group {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }
    .record-download-card button {
      flex: 1;
      padding: var(--space-sm) var(--space-md);
      font-size: 0.875rem;
      border-radius: var(--radius-md);
    }
    .record-download-card .btn-close {
      position: absolute;
      top: var(--space-sm);
      right: var(--space-sm);
      background: transparent;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 1.2rem;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .record-download-card .btn-close:hover {
      background: var(--color-border-light);
      color: var(--color-text);
    }
  
    .contact-menu {
      display: inline-block;
      position: relative;
    }
    .contact-menu summary {
      list-style: none;
      cursor: pointer;
    }
    .contact-menu summary::-webkit-details-marker {
      display: none;
    }
    .contact-menu-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 180px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(15, 23, 42, 0.12);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
      display: grid;
      gap: 8px;
      z-index: 50;
    }
    .contact-menu-panel .btn-link {
      display: block;
      text-align: center;
      white-space: nowrap;
    }


    /* ===== AI 优化建议弹窗 ===== */
    #ai-optimization-modal .modal-box {
      max-width: 720px;
      max-height: 85vh;
      overflow-y: auto;
    }
    #ai-optimization-modal .modal-body {
      padding: 20px 24px;
    }
    .ai-opt-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--color-primary);
      gap: 16px;
    }
    .ai-opt-loading .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: ai-spin 0.8s linear infinite;
    }
    @keyframes ai-spin {
      to { transform: rotate(360deg); }
    }
    .ai-opt-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-xl);
      padding: 16px 20px;
      color: #991b1b;
      font-size: 14px;

    .ai-opt-actions {
      display: flex;

<body>
  <div id="screen-pwd" class="screen active">
    <div class="card">
      <h1>医学讨论室</h1>
      <p class="card-subtitle">Medical PBL · 问题导向学习</p>
      <input type="password" id="pwd-input" placeholder="请输入访问密码">
      <div id="pwd-err" class="error" style="display:none"></div>
      <button id="pwd-btn">进入</button>
    </div>
  </div>
  <div id="screen-splash" class="screen splash">
    <img id="splash-image" src="" alt="郑渝澎荣誉出品" onerror="handleSplashImageError(this)">
    <div id="splash-fallback" class="splash-fallback">
      <h2 style="margin-bottom:10px;">医学讨论室 · Medical PBL</h2>
      <p style="color:#334155;">欢迎进入课堂。当前未检测到开屏图片，系统已自动降级为文本开屏，不影响使用。</p>
    </div>
  </div>
  <div id="screen-login" class="screen">
    <div class="card">
      <h1>登录</h1>
      <input type="text" id="login-id" placeholder="学号/工号">
      <input type="text" id="login-name" placeholder="姓名">
      <select id="login-role">
        <option value="student">学生</option>
        <option value="teacher">老师</option>
      </select>
      <div id="login-err" class="error" style="display:none"></div>
      <button id="login-btn">进入</button>
    </div>
  </div>
  <div id="screen-teacher-lobby" class="screen">
    <div class="card">
      <h1>老师大厅</h1>
      <button id="create-room-btn">创建房间</button>
      <div class="lobby-divider">或</div>
      <input type="text" id="teacher-join-code" placeholder="输入6位房间号重新进入" maxlength="6">
      <div id="teacher-join-err" class="error" style="display:none"></div>
      <button id="teacher-join-btn">进入房间</button>
      <button id="records-btn" class="btn-secondary" style="margin-top:12px;">历史记录</button>
      <div id="records-list" style="display:none; margin-top:12px; text-align:left;"></div>
      <details class="contact-menu" id="contact-author-btn">
      <summary class="btn-link">联系作者</summary>
      <div class="contact-menu-panel">
        <a href="mailto:SamuelGarcia7329@outlook.com" class="btn-link">链接式</a>
        <a href="/email.html" class="btn-link" target="_blank" rel="noopener">查看复制邮箱</a>
      </div>
    </details>
      <div id="analysis-btn-wrap" style="display:none; margin-top:16px;">
        <button id="show-analysis-btn" class="btn-secondary">查看详细分析</button>
      </div>
    </div>
  </div>
  <div id="screen-student-lobby" class="screen">
    <div class="card">
      <h1>学生大厅</h1>
      <input type="text" id="join-code" placeholder="输入6位房间号" maxlength="6">
      <div id="join-err" class="error" style="display:none"></div>
      <button id="join-btn">加入房间</button>
    </div>
  </div>
  <div id="screen-chat" class="screen" style="display:none;align-items:stretch">
    <div class="chat-layout">
      <div class="chat-main">
        <div class="chat-header">
          <span id="chat-title">房间</span>
          <span id="chat-header-actions" style="display:none" class="chat-header-actions">
            <span id="ai-toggle-wrap" class="ai-toggle-wrap">
              <label class="ai-toggle-label">
                <span class="ai-toggle-text">AI机器人</span>
                <input type="checkbox" id="ai-enabled-toggle" class="ai-toggle-input">
                <span class="ai-toggle-slider"></span>
              </label>
            </span>
            <span id="close-room-wrap"><button class="danger" id="close-room-btn" style="width:auto;margin:0">关闭房间</button></span>
          </span>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-wrap">
          <input type="file" id="file-input" accept="image/*,.pdf,.doc,.docx,.txt,.xlsx,.xls,.pptx,.ppt,.rtf" style="display:none">
          <button id="upload-btn" type="button">上传文件</button>
          <textarea id="chat-input" class="chat-input" rows="2" placeholder="输入消息"></textarea>
          <button id="chat-send" class="chat-send">发送</button>
        </div>
      </div>
      <div id="student-sidebar" class="student-sidebar" style="display:none">
        <h3>学生列表</h3>
        <div id="student-list" class="student-list"></div>
      </div>
    </div>
  </div>

  <div id="analysis-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-title">讨论分析报告</span>
        <button id="modal-close" aria-label="关闭" style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:24px;line-height:1;padding:0 8px;opacity:0.9;">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-tabs">
          <span class="modal-tab active" data-tab="scores">评分表</span>
          <span class="modal-tab" data-tab="participation">参与度</span>
          <span class="modal-tab" data-tab="questions">提问质量</span>
          <span class="modal-tab" data-tab="keywords">关键词</span>
          <span class="modal-tab" data-tab="cooccurrence">共线分析</span>
          <span class="modal-tab" data-tab="time">时间分布</span>
          <span class="modal-tab" data-tab="scoreCompare">评分对比</span>
          <span class="modal-tab" data-tab="stats">统计指标</span>
        </div>
        <div id="section-scores" class="analysis-section active"></div>
        <div id="section-participation" class="analysis-section"></div>
        <div id="section-questions" class="analysis-section"></div>
        <div id="section-keywords" class="analysis-section"></div>
        <div id="section-cooccurrence" class="analysis-section"></div>
        <div id="section-time" class="analysis-section"></div>
        <div id="section-scoreCompare" class="analysis-section"></div>
        <div id="section-stats" class="analysis-section"></div>
      </div>
    </div>
  </div>

  <!-- AI 优化建议弹窗 -->
  <div id="ai-optimization-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <span id="ai-opt-modal-title">AI 优化建议</span>
        <button id="ai-opt-modal-close" aria-label="关闭" style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:24px;line-height:1;padding:0 8px;opacity:0.9;">×</button>
      </div>
      <div class="modal-body" id="ai-opt-modal-body">
        <!-- 动态填充 -->
      </div>
    </div>
  </div>

  <script>
    let user = null;
    let sessionToken = sessionStorage.getItem('pbl_session_token') || '';
    let pendingPassword = '';
    let roomCode = null;
    let socket = null;
    let aiEventSource = null;
    let studentScores = {};
    let pendingAnalysis = null;
    const ANALYSIS_CACHE_KEY = 'medical_pbl_latest_analysis';
    const streamingAiNodes = new Map();

    function show(id) {
      document.querySelectorAll('.screen').forEach((e) => e.classList.remove('active'));
      document.querySelectorAll('.screen').forEach((e) => { e.style.display = 'none'; });
      const el = document.getElementById(id);
      if (el) { el.style.display = 'flex'; el.classList.add('active'); }
    }

    function surname(name) {
      return (name || '?').charAt(0);
    }

    function authHeaders(extra = {}) {
      return sessionToken ? { ...extra, Authorization: `Bearer ${sessionToken}` } : extra;
    }

    function handleAuthError(message = '登录已过期，请重新登录') {
      alert(message);
      sessionStorage.removeItem('pbl_session_token');
      sessionToken = '';
      user = null;
      show('screen-pwd');
    }

    function handleSplashImageError(img) {
      if (!img) return;
      img.style.display = 'none';
      const fallback = document.getElementById('splash-fallback');
      if (fallback) fallback.classList.add('show');
    }

    document.getElementById('pwd-btn').onclick = () => {
      pendingPassword = document.getElementById('pwd-input').value.trim();
      const err = document.getElementById('pwd-err');
      if (!pendingPassword) { err.textContent = '请输入访问密码'; err.style.display = 'block'; return; }
      err.style.display = 'none';
      const splashImg = document.getElementById('splash-image');
      const splashFallback = document.getElementById('splash-fallback');
      splashImg?.classList.remove('dissolve-out');
      show('screen-splash');
      if (splashImg && splashImg.style.display !== 'none') {
        setTimeout(() => splashImg?.classList.add('dissolve-out'), 3000);
      }
      if (splashFallback && splashFallback.classList.contains('show')) {
        setTimeout(() => splashFallback.classList.add('dissolve-out'), 3000);
      }
      setTimeout(() => show('screen-login'), 4000);
    };

    document.getElementById('pwd-input').onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('pwd-btn').click(); };

    document.getElementById('login-btn').onclick = async () => {
      const id = document.getElementById('login-id').value.trim();
      const name = document.getElementById('login-name').value.trim();
      const role = document.getElementById('login-role').value;
      const err = document.getElementById('login-err');
      if (!id || !name) { err.textContent = '学号和姓名不能为空'; err.style.display = 'block'; return; }
      err.style.display = 'none';
      try {
        const res = await fetch('/api/session/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pendingPassword, studentId: id, name, role }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '登录失败');
        sessionToken = data.token;
        sessionStorage.setItem('pbl_session_token', sessionToken);
        user = data.user;
      } catch (e) {
        err.textContent = e.message === '密码错误' ? '密码错误' : e.message;
        err.style.display = 'block';
        return;
      }
      if (role === 'teacher') {
        show('screen-teacher-lobby');
        if (!pendingAnalysis) {
          try {
            const cached = localStorage.getItem(ANALYSIS_CACHE_KEY);
            if (cached) pendingAnalysis = JSON.parse(cached);
          } catch (_) {}
        }
        document.getElementById('analysis-btn-wrap').style.display = pendingAnalysis ? 'block' : 'none';
      } else show('screen-student-lobby');
    };

    document.getElementById('records-btn').onclick = async () => {
      const box = document.getElementById('records-list');
      box.style.display = 'block';
      box.textContent = '正在加载...';
      try {
        const res = await fetch('/api/records', { headers: authHeaders() });
        const data = await res.json();
        if (res.status === 401) return handleAuthError();
        if (!res.ok) throw new Error(data.message || '读取历史记录失败');
        if (!data.records || data.records.length === 0) {
          box.textContent = '暂无服务器记录。';
          return;
        }
        box.innerHTML = data.records.map((r) => `<div class="record-item" style="padding:10px;border:1px solid #e5e7eb;border-radius:8px;margin:8px 0;">
          <div>${escapeHtml(r.date || '')} ｜ 教师：${escapeHtml(r.teacherName || '')} ｜ 房间：${escapeHtml(r.roomCode || '')}</div>
          <div>文件数量：${(r.files || []).length}</div>
          <button onclick="window.open('${escapeHtml(r.downloadUrl)}','_blank')">下载完整记录包</button>
        </div>`).join('');
      } catch (e) {
        box.textContent = e.message;
      }
    };

    document.getElementById('create-room-btn').onclick = async () => {
      try {
        const res = await fetch('/api/room/create', {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({}),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '创建失败');
        enterRoom(data.roomCode, true);
      } catch (e) {
        alert(e.message);
      }
    };

    document.getElementById('teacher-join-btn').onclick = async () => {
      const code = document.getElementById('teacher-join-code').value.trim();
      const err = document.getElementById('teacher-join-err');
      if (code.length !== 6) { err.textContent = '请输入6位房间号'; err.style.display = 'block'; return; }
      try {
        const res = await fetch('/api/room/join', {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ roomCode: code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '加入失败');
        err.style.display = 'none';
        enterRoom(code, true);
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
      }
    };

    document.getElementById('join-btn').onclick = async () => {
      const code = document.getElementById('join-code').value.trim();
      const err = document.getElementById('join-err');
      if (code.length !== 6) { err.textContent = '请输入6位房间号'; err.style.display = 'block'; return; }
      try {
        const res = await fetch('/api/room/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId: user.studentId, name: user.name, roomCode: code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '加入失败');
        err.style.display = 'none';
        enterRoom(code, false);
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
      }
    };

    function enterRoom(code, isTeacher) {
      roomCode = code;
      document.getElementById('chat-title').textContent = `房间 ${code}`;
      document.getElementById('chat-header-actions').style.display = isTeacher ? 'flex' : 'none';
      document.getElementById('student-sidebar').style.display = isTeacher ? 'flex' : 'none';
      document.querySelector('.chat-layout').classList.toggle('no-sidebar', !isTeacher);
      document.getElementById('chat-messages').innerHTML = '';
      document.getElementById('chat-input').value = '';
      studentScores = {};
      const aiToggle = document.getElementById('ai-enabled-toggle');
      if (aiToggle) aiToggle.checked = false;

      closeAIStream();

      socket = io({ auth: { token: sessionToken, roomCode } });
      openAIStream(code);

      socket.on('message', (msg) => {
        appendMessage(msg);
      });

      socket.on('student-list', (list) => {
        const el = document.getElementById('student-list');
        el.innerHTML = list.map((s) => {
          const attitudeScore = s.attitudeScore ?? 100;
          const thinkingScore = s.thinkingScore ?? 100;
          studentScores[s.studentId] = { attitude: attitudeScore, thinking: thinkingScore };
          return `<div class="student-item" data-id="${s.studentId}">
            <div class="avatar">${surname(s.name)}</div>
            <div class="info">
              <div class="name">${escapeHtml(s.name)}</div>
              <div class="id">${escapeHtml(s.studentId)}</div>
            </div>
            <div class="scoring-section">
              <div class="score-item">
                <label>教师态度评分</label>
                <div class="score-controls">
                  <input type="range" min="0" max="100" value="${attitudeScore}" data-id="${s.studentId}" data-type="attitude" step="5">
                  <span class="score-value">${attitudeScore}${s.attitudeEdited ? ' <small>(已调整)</small>' : ' <small>(默认)</small>'}</span>
                </div>
                <small class="score-hint">默认满分。仅在学生参与不足、态度消极、明显不配合时下调。</small>
              </div>
              <div class="score-item">
                <label>教师思维评分</label>
                <div class="score-controls">
                  <input type="range" min="0" max="100" value="${thinkingScore}" data-id="${s.studentId}" data-type="thinking" step="5">
                  <span class="score-value">${thinkingScore}${s.thinkingEdited ? ' <small>(已调整)</small>' : ' <small>(默认)</small>'}</span>
                </div>
                <small class="score-hint">默认满分。仅在学生逻辑混乱、缺乏医学推理、不能提出有效分析时下调。</small>
              </div>
            </div>
          </div>`;
        }).join('');
        el.querySelectorAll('input[type="range"]').forEach((r) => {
          r.oninput = () => {
            const id = r.dataset.id;
            const type = r.dataset.type;
            const v = +r.value;
            
            if (!studentScores[id]) studentScores[id] = { attitude: 100, thinking: 100 };
            studentScores[id][type] = v;
            
            // 更新显示
            const scoreValue = r.parentElement.querySelector('.score-value');
            scoreValue.innerHTML = `${v} <small>(已调整)</small>`;
            
            // 发送到服务器
            if (type === 'attitude') {
              socket.emit('score', { studentId: id, attitudeScore: v });
            } else if (type === 'thinking') {
              socket.emit('score', { studentId: id, thinkingScore: v });
            }
            const pop = document.createElement('div');
            pop.className = 'score-popup';
            pop.textContent = v;
            const rect = r.getBoundingClientRect();
            pop.style.left = (rect.left + rect.width / 2 - 20) + 'px';
            pop.style.top = (rect.top - 32) + 'px';
            document.body.appendChild(pop);
            pop.offsetHeight;
            pop.classList.add('fade-out');
            setTimeout(() => pop.remove(), 500);
          };
        });
      });

      socket.on('ai-enabled', (data) => {
        const cb = document.getElementById('ai-enabled-toggle');
        if (cb) cb.checked = !!data.enabled;
      });

      socket.on('room_closed_files', (data) => {
        // 保留原来的 CSV/DOCX 下载逻辑
        if (data.csv) {
          const csvBuf = Uint8Array.from(atob(data.csv), c => c.charCodeAt(0));
          const blob = new Blob([csvBuf], { type: 'text/csv;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = data.csvFilename || '成绩表.csv';
          a.click();
          URL.revokeObjectURL(url);
        }
        if (data.docx) {
          const docxBuf = Uint8Array.from(atob(data.docx), c => c.charCodeAt(0));
          const blob = new Blob([docxBuf], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = data.docxFilename || '讨论记录.docx';
          a.click();
          URL.revokeObjectURL(url);
        }
        if (data.analysis) {
          pendingAnalysis = data.analysis;
          try { localStorage.setItem(ANALYSIS_CACHE_KEY, JSON.stringify(data.analysis)); } catch (_) {}
        }

        // 新增：处理服务器记录保存状态
        if (data.recordSaved && data.downloadUrl) {
          showRecordDownloadCard({
            type: 'success',
            recordsPath: data.recordsPath,
            downloadUrl: data.downloadUrl,
            archiveFilename: data.archiveFilename
          });
        }
        
        // 如果保存失败，显示警告
        if (data.saveError) {
          showRecordDownloadCard({
            type: 'warning',
            message: data.saveError
          });
        }

        // AI 优化建议弹窗
        const aiOptRecordId = getRecordIdFromRoomClosedPayload(data);

        console.log('[ROOM_CLOSED_FILES_PAYLOAD]', data);
        console.log('[AI_OPT_RECORD_ID]', aiOptRecordId);

        if (aiOptRecordId) {
          showAIOptimizationModal(aiOptRecordId);
        } else {
          console.warn('[AI_OPT_RECORD_ID_MISSING]', data);
          if (typeof showToast === 'function') {
            showToast('课堂记录已保存，但 AI 优化建议无法定位记录 ID，请检查日志', 'warning');
          }
        }
      });

      socket.on('record_saved', (data) => {

    function getRecordIdFromRoomClosedPayload(data) {
      if (!data) return '';

      if (data.recordId) return String(data.recordId).trim();

      const possiblePath =
        data.recordPath ||
        data.recordsPath ||
        data.savePath ||
        data.savedPath ||
        data.dir ||
        data.path ||
        (data.savedRecord && data.savedRecord.recordsDir) ||
        (data.savedRecord && data.savedRecord.recordPath) ||
        '';

      if (possiblePath) {
        const clean = String(possiblePath).replace(/\\/g, '/').replace(/\/+$/, '');
        const parts = clean.split('/');
        return (parts[parts.length - 1] || '').trim();
      }

      if (data.manifest && data.manifest.recordId) {
        return String(data.manifest.recordId).trim();
      }

      return '';
    }

    async function generateReview(recordId, bodyEl) {
      try {
        const resp = await fetch('/api/ai/generate-optimization-review', {
          method: 'POST',
          headers: { ...authHeaders(), 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            recordId: recordId,
            roles: ['teacher', 'B', 'C'],
            triggerRules: ['auto']
          })
        });

        if (!resp.ok) {
          const errText = await resp.text().catch(() => '未知错误');
          throw new Error(`HTTP ${resp.status}: ${errText}`);
        }

        const data = await resp.json();
        if (!data.ok) {
          throw new Error(data.error || '生成优化建议失败');
        }

        aiOptReviewData = data;
        renderReview(data, bodyEl);
      } catch (err) {
        bodyEl.innerHTML = `
          <div class="ai-opt-error">
            <p><strong>生成优化建议失败</strong></p>
            <p>${escapeHtml(err.message)}</p>
            <button class="retry-btn" onclick="generateReview('${escapeHtml(recordId)}', document.getElementById('ai-opt-modal-body'))">重试</button>
          </div>
        `;
      }
    }

    function renderReview(data, bodyEl) {
      const { reviewId, recordId, files, reviews } = data;
      const roleNames = { teacher: 'A教授', B: 'B同学', C: 'C同学' };

      let html = '';

      // 遍历每个角色的评审结果
      for (const review of (reviews || [])) {
        const roleKey = review.role || review.roleKey || '';
        const roleName = roleNames[roleKey] || review.roleName || roleKey;
        const avatarChar = roleName.charAt(0);

        html += `
          <div class="ai-opt-review-card">
            <div class="role-header">
              <div class="role-avatar">${escapeHtml(avatarChar)}</div>

            </div>
            <div class="review-content">${escapeHtml(review.summary || '暂无建议')}</div>
        `;

        // 显示补丁列表
        if (review.suggestions && review.suggestions.length > 0) {
          html += '<div class="patch-list">';
          for (const suggestion of review.suggestions) {
            const opClass = suggestion.patchAction || 'modify';
            const opLabel = { add: '新增', modify: '修改', delete: '删除' }[opClass] || opClass;
            html += `
              <div class="patch-item">

    async function applyOptimization() {
      if (!aiOptReviewData) return;

      const { reviewId, recordId } = aiOptReviewData;
      const resultEl = document.getElementById('ai-opt-apply-result');
      const applyBtn = document.querySelector('#ai-optimization-modal .btn-apply');

      if (!resultEl) return;

      // 禁用按钮，显示加载
      if (applyBtn) {
        applyBtn.disabled = true;
        applyBtn.textContent = '正在应用...';
      }
      resultEl.innerHTML = '';
      resultEl.className = 'ai-opt-apply-result';

      try {
        const resp = await fetch('/api/ai/apply-optimization', {
          method: 'POST',
          headers: { ...authHeaders(), 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ recordId, reviewId })
        });

        if (!resp.ok) {
          const errText = await resp.text().catch(() => '未知错误');
          throw new Error(`HTTP ${resp.status}: ${errText}`);
        }

        const data = await resp.json();
        if (!data.ok) {
          throw new Error(data.error || '应用优化失败');
        }

        const { appliedPatches, failedPatches, backupDir } = data;
        const totalApplied = (appliedPatches || []).length;
        const totalFailed = (failedPatches || []).length;

        if (totalFailed === 0) {
          resultEl.className = 'ai-opt-apply-result success';
          resultEl.innerHTML = `
            <p><strong>✅ 优化建议已全部应用</strong></p>
            <p>成功应用 ${totalApplied} 项优化。备份目录：${escapeHtml(backupDir || 'N/A')}</p>
          `;
        } else {
          resultEl.className = 'ai-opt-apply-result partial';
          let failedHtml = '';
          for (const fp of (failedPatches || [])) {
            failedHtml += `<li>${escapeHtml(fp.file || '')}: ${escapeHtml(fp.error || '未知错误')}</li>`;
          }
          resultEl.innerHTML = `
            <p><strong>⚠️ 部分优化应用失败</strong></p>
            <p>成功 ${totalApplied} 项，失败 ${totalFailed} 项。</p>
            ${failedHtml ? '<ul>' + failedHtml + '</ul>' : ''}
            <p>备份目录：${escapeHtml(backupDir || 'N/A')}</p>
          `;
        }

        if (applyBtn) {
          applyBtn.textContent = '已完成';
        }
      } catch (err) {
        resultEl.className = 'ai-opt-apply-result partial';
        resultEl.innerHTML = `
          <p><strong>❌ 应用优化失败</strong></p>
          <p>${escapeHtml(err.message)}</p>
        `;
        if (applyBtn) {
          applyBtn.disabled = false;
          applyBtn.textContent = '重试应用';
        }
      }
    }

    function openAIStream(code) {
      if (!user) return;
      aiEventSource = new EventSource(`/api/room/${encodeURIComponent(code)}/ai/stream?token=${encodeURIComponent(sessionToken)}`);
      aiEventSource.addEventListener('ai-start', (event) => {
        const payload = JSON.parse(event.data);
        if (streamingAiNodes.has(payload.streamId)) return;
        const msg = {
          userId: payload.userId,
          userName: payload.userName,
          userType: payload.userType,
          studentId: '',
          content: '',
          timestamp: payload.timestamp,
          type: 'text',
        };
        const node = appendMessage(msg);
        const contentNode = node.querySelector('.msg-content');
        streamingAiNodes.set(payload.streamId, { node, contentNode });
      });
      aiEventSource.addEventListener('ai-chunk', (event) => {
        const payload = JSON.parse(event.data);
        const streamNode = streamingAiNodes.get(payload.streamId);
        if (!streamNode) return;
        streamNode.contentNode.textContent = payload.content || '';
        document.getElementById('chat-messages').scrollTop = 1e9;
      });
      aiEventSource.addEventListener('ai-done', (event) => {
        const payload = JSON.parse(event.data);
        const streamNode = streamingAiNodes.get(payload.streamId);
        if (streamNode) {
          streamNode.contentNode.textContent = payload.content || '';
          const timeNode = streamNode.node.querySelector('.msg-time');
          if (timeNode) timeNode.textContent = formatTime(payload.timestamp);
          streamingAiNodes.delete(payload.streamId);
        }
      });
      aiEventSource.addEventListener('ai-error', (event) => {
        const payload = JSON.parse(event.data);
        const streamNode = streamingAiNodes.get(payload.streamId);
        if (streamNode) {
          streamNode.contentNode.textContent = `[AstrBot 暂时不可用] ${payload.message || ''}`;
          streamingAiNodes.delete(payload.streamId);
        }
      });
      aiEventSource.addEventListener('ai-cancel', (event) => {
        const payload = JSON.parse(event.data);
        const streamNode = streamingAiNodes.get(payload.streamId);
        if (streamNode) {
          streamNode.node.remove();
          streamingAiNodes.delete(payload.streamId);
        }
      });
      aiEventSource.onerror = () => {};
    }

    function generateWordCloudDataUrl(words) {
      if (!words.length) return '';
      const width = 780;
      const height = 300;
      const cx = width / 2;
      const cy = height / 2;
      const maxCount = Math.max(...words.map((w) => w.count));
      const minCount = Math.min(...words.map((w) => w.count));
      const spread = Math.max(maxCount - minCount, 1);
      const palette = ['#0D9488', '#1E40AF', '#059669', '#0F766E', '#3B82F6', '#14B8A6'];
      const used = [];
      const items = words.slice(0, 30).map((w, idx) => {
        const ratio = (w.count - minCount) / spread;
        const size = 16 + Math.round(ratio * 26);
        let angle = idx * 0.85;
        let radius = 20 + idx * 10;
        let x = cx;
        let y = cy;
        for (let t = 0; t < 24; t++) {
          x = Math.round(cx + Math.cos(angle) * radius);
          y = Math.round(cy + Math.sin(angle) * radius);
          const ok = !used.some((p) => Math.abs(p.x - x) < 50 && Math.abs(p.y - y) < 28);
          if (ok) break;
          angle += 0.35;
          radius += 10;
        }
        used.push({ x, y });
        return `<text x="${x}" y="${y}" fill="${palette[idx % palette.length]}" font-size="${size}" font-weight="${size > 30 ? 700 : 600}" text-anchor="middle">${escapeHtml(w.word)}</text>`;
      });
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}"><rect width="100%" height="100%" fill="#F8FAFC" rx="12" ry="12"/>${items.join('')}</svg>`;
      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

          </div>
          <table class="analysis-table">
            <tr><th>学号</th><th>姓名</th><th>提问数</th><th>AI回应</th><th>同学回应</th><th>质量指数</th></tr>
            ${(questionStats.byStudent || []).map((q) => `<tr><td>${escapeHtml(q.studentId ?? '-')}</td><td>${escapeHtml(q.name ?? '-')}</td><td>${q.questionCount ?? 0}</td><td>${q.aiReplyCount ?? 0}</td><td>${q.peerReplyCount ?? 0}</td><td>${q.qualityIndex ?? 0}%</td></tr>`).join('') || '<tr><td colspan="6">暂无学生提问数据</td></tr>'}
          </table>
          <div class="chart-wrap"><canvas id="chartQuestionQuality"></canvas></div>
        </div>`;
      setTimeout(() => {
        if (typeof Chart !== 'undefined' && (questionStats.byStudent || []).length) {
          const chart = new Chart(document.getElementById('chartQuestionQuality'), {
            type: 'bar',
            data: {
              labels: questionStats.byStudent.map((q) => q.name || q.studentId),
              datasets: [
                { label: '提问数', data: questionStats.byStudent.map((q) => q.questionCount), backgroundColor: '#1E40AF' },
                { label: 'AI回应数', data: questionStats.byStudent.map((q) => q.aiReplyCount), backgroundColor: '#0D9488' },
                { label: '同学回应数', data: questionStats.byStudent.map((q) => q.peerReplyCount || 0), backgroundColor: '#059669' },
              ],
            },
            options: { responsive: true, maintainAspectRatio: false },
          });
          chartInstances.push(chart);
        }
      }, 70);

      const wordCloudSrc = generateWordCloudDataUrl(keywords);
      document.getElementById('section-keywords').innerHTML = `
        <div class="analysis-card">
          <h4>高频医学关键词 TOP 20</h4>
          ${wordCloudSrc ? `<img src="${wordCloudSrc}" alt="关键词词云" style="width:100%;max-width:780px;border:1px solid #E2E8F0;border-radius:12px;background:#fff;padding:8px;">` : '<p>暂无词云数据</p>'}
          <div style="height:10px;"></div>
          <p style="line-height:1.8;">${keywords.slice(0, 20).map((k) => `<span style="margin-right:12px;">${escapeHtml(k.word)}(${k.count})</span>`).join('') || '无'}</p>
        </div>`;

      document.getElementById('section-cooccurrence').innerHTML = `
        <div class="analysis-card">
          <h4>关键词共线分析 TOP 20</h4>
          <table class="analysis-table">
            <tr><th>关键词A</th><th>关键词B</th><th>共现次数</th><th>强度</th></tr>
            ${cooccurrence.map((c) => `<tr><td>${escapeHtml(c.source)}</td><td>${escapeHtml(c.target)}</td><td>${c.count}</td><td>${c.strength ?? 0}</td></tr>`).join('') || '<tr><td colspan="4">暂无有效共线数据</td></tr>'}
          </table>
          <div class="chart-wrap"><canvas id="chartCooccurrence"></canvas></div>
          <div class="chart-wrap"><canvas id="chartCooccurrenceScatter"></canvas></div>
        </div>`;
      setTimeout(() => {
        if (typeof Chart !== 'undefined' && cooccurrence.length) {
          const chart = new Chart(document.getElementById('chartCooccurrence'), {
            type: 'bar',
            data: {
              labels: cooccurrence.slice(0, 8).map((c) => `${c.source}-${c.target}`),
              datasets: [{ label: '共线强度', data: cooccurrence.slice(0, 8).map((c) => c.strength || 0), backgroundColor: '#1E40AF' }],
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
          });
          const chartScatter = new Chart(document.getElementById('chartCooccurrenceScatter'), {
            type: 'scatter',
            data: {
              datasets: [{
                label: '词对分布',
                data: cooccurrence.map((c) => ({ x: c.count, y: c.strength || 0 })),
                backgroundColor: '#059669',
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                x: { title: { display: true, text: '共现次数' } },
                y: { title: { display: true, text: '共线强度' } },
              },
            },
          });
          chartInstances.push(chart, chartScatter);
        }
      }, 60);

      document.getElementById('section-time').innerHTML = `
        <div class="analysis-card">
          <h4>发言时间分布（按分钟）</h4>
          <div class="chart-wrap"><canvas id="chartTime"></canvas></div>
          ${minuteDist.length ? '' : '<p style="color:#64748B;">暂无时间分布数据</p>'}
          <p>平均发言间隔：${a.timeStats?.avgInterval ?? 0} 分钟；中位数间隔：${a.timeStats?.medianInterval ?? 0} 分钟；高峰分钟：第 ${a.timeStats?.peakMinute ?? 0} 分钟</p>
        </div>`;
      setTimeout(() => {
        if (typeof Chart !== 'undefined' && minuteDist.length) {
          const chart = new Chart(document.getElementById('chartTime'), {
            type: 'line',
            data: {
              labels: minuteDist.map((t) => `第${t.minute}分`),
              datasets: [{ label: '发言数', data: minuteDist.map((t) => t.count), borderColor: '#1E40AF', backgroundColor: 'rgba(30, 64, 175, 0.1)', fill: true }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
          });
          chartInstances.push(chart);
        }
      }, 100);

      const toScoreNumber = (value, fallback = 0) => {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      };

      const roundScoreNumber = (value, digits = 2) => {
        const n = Number(value);
        if (!Number.isFinite(n)) return '—';
        const p = Math.pow(10, digits);
        return Math.round(n * p) / p;
      };

      const scoreRows = scores.map((s) => {
        const machineAttitude = toScoreNumber(s.machineAttitudeScore ?? s.machineScore, 0);
        const machineThinking = toScoreNumber(s.machineThinkingScore ?? s.machineScore, 0);
        const teacherAttitude = toScoreNumber(s.teacherAttitudeScore ?? s.teacherScore, 100);
        const teacherThinking = toScoreNumber(s.teacherThinkingScore ?? s.teacherScore, 100);
        const finalScore = toScoreNumber(
          s.finalScore ?? Math.round((machineAttitude + machineThinking + teacherAttitude + teacherThinking) / 4),
          0
        );

        return {
          studentId: s.studentId ?? '-',
          name: s.name ?? '-',
          machineAttitude,
          machineThinking,
          teacherAttitude,
          teacherThinking,
          attitudeGap: teacherAttitude - machineAttitude,
          thinkingGap: teacherThinking - machineThinking,
          finalScore,
        };
      });

      const meanAbsDiff = (rows, gapKey) => {
        if (!rows.length) return 0;
        const sum = rows.reduce((acc, r) => acc + Math.abs(Number(r[gapKey]) || 0), 0);
        return Math.round((sum / rows.length) * 100) / 100;
      };

      const safeCorrelation = (rows, xKey, yKey) => {
        if (!rows.length || rows.length < 2) return null;
        const xs = rows.map((r) => Number(r[xKey]) || 0);
        const ys = rows.map((r) => Number(r[yKey]) || 0);
        const xMean = xs.reduce((sum, v) => sum + v, 0) / xs.length;
        const yMean = ys.reduce((sum, v) => sum + v, 0) / ys.length;

        let num = 0;
        let xDen = 0;
        let yDen = 0;

        for (let i = 0; i < xs.length; i++) {
          const xd = xs[i] - xMean;
          const yd = ys[i] - yMean;
          num += xd * yd;
          xDen += xd * xd;
          yDen += yd * yd;
        }

        if (!xDen || !yDen) return null;
        return Math.round((num / Math.sqrt(xDen * yDen)) * 1000) / 1000;
      };

      const attitudeMAE = meanAbsDiff(scoreRows, 'attitudeGap');
      const thinkingMAE = meanAbsDiff(scoreRows, 'thinkingGap');
      const attitudePearson = safeCorrelation(scoreRows, 'machineAttitude', 'teacherAttitude');
      const thinkingPearson = safeCorrelation(scoreRows, 'machineThinking', 'teacherThinking');

      document.getElementById('section-scoreCompare').innerHTML = `
        <div class="analysis-card">
          <h4>教师评分 vs 机器评分（双轨评分）</h4>
          <p style="color:#64748B;margin-top:4px;">
            机器态度评分基于发言参与度；机器思维评分基于发言逻辑性。教师评分分为教师态度评分和教师思维评分，默认满分，教师只需要调整异常学生。
          </p>

          <div class="chart-wrap"><canvas id="chartAttitudeCompare"></canvas></div>
          <div class="chart-wrap"><canvas id="chartThinkingCompare"></canvas></div>
          <div class="chart-wrap"><canvas id="chartDualScoreBar"></canvas></div>

          <table class="analysis-table">
            <tr>
              <th>学号</th>
              <th>姓名</th>
              <th>机器态度</th>
              <th>机器思维</th>
              <th>教师态度</th>
              <th>教师思维</th>
              <th>态度差值</th>
              <th>思维差值</th>
              <th>最终成绩</th>
            </tr>
            ${scoreRows.map((s) => `
              <tr>
                <td>${escapeHtml(s.studentId)}</td>
                <td>${escapeHtml(s.name)}</td>
                <td>${roundScoreNumber(s.machineAttitude)}</td>
                <td>${roundScoreNumber(s.machineThinking)}</td>
                <td>${roundScoreNumber(s.teacherAttitude)}</td>
                <td>${roundScoreNumber(s.teacherThinking)}</td>
                <td>${roundScoreNumber(s.attitudeGap)}</td>
                <td>${roundScoreNumber(s.thinkingGap)}</td>
                <td>${roundScoreNumber(s.finalScore)}</td>
              </tr>
            `).join('') || '<tr><td colspan="9">暂无评分对比数据</td></tr>'}
          </table>

          <p>
            态度评分 Pearson：${attitudePearson ?? '无法计算（数据无变化）'}；
            思维评分 Pearson：${thinkingPearson ?? '无法计算（数据无变化）'}；
            态度 MAE：${attitudeMAE}；
            思维 MAE：${thinkingMAE}
          </p>
        </div>`;

      setTimeout(() => {
        if (typeof Chart !== 'undefined' && scoreRows.length) {
          const buildScatterChart = (canvasId, xKey, yKey, pointLabel, xTitle, yTitle) => {
            const points = scoreRows.map((s) => ({ x: Number(s[xKey]) || 0, y: Number(s[yKey]) || 0 }));
            const xs = points.map((p) => p.x);
            const ys = points.map((p) => p.y);
            const xMean = xs.reduce((sum, v) => sum + v, 0) / xs.length;
            const yMean = ys.reduce((sum, v) => sum + v, 0) / ys.length;

            let num = 0;
            let den = 0;
            for (let i = 0; i < points.length; i++) {
              num += (xs[i] - xMean) * (ys[i] - yMean);
              den += (xs[i] - xMean) * (xs[i] - xMean);
            }

            const slope = den ? (num / den) : null;
            const intercept = slope != null ? (yMean - slope * xMean) : null;
            const xMin = Math.min(...xs);
            const xMax = Math.max(...xs);
            const trendData = slope == null ? [] : [
              { x: xMin, y: slope * xMin + intercept },
              { x: xMax, y: slope * xMax + intercept },
            ];

            return new Chart(document.getElementById(canvasId), {
              type: 'scatter',
              data: {
                datasets: [
                  {
                    label: pointLabel,
                    data: points,
                    backgroundColor: '#0D9488',
                  },
                  {
                    label: '趋势线',
                    data: trendData,
                    type: 'line',
                    borderColor: '#DC2626',
                    borderWidth: 2,
                    pointRadius: 0,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  x: { title: { display: true, text: xTitle }, min: 0, max: 100 },
                  y: { title: { display: true, text: yTitle }, min: 0, max: 100 },
                },
              },
            });
          };

          const chartAttitude = buildScatterChart(
            'chartAttitudeCompare',
            'machineAttitude',
            'teacherAttitude',
            '态度评分',
            '机器态度评分',
            '教师态度评分'
          );

          const chartThinking = buildScatterChart(
            'chartThinkingCompare',
            'machineThinking',
            'teacherThinking',
            '思维评分',
            '机器思维评分',
            '教师思维评分'
          );

          const chartDualBar = new Chart(document.getElementById('chartDualScoreBar'), {
            type: 'bar',
            data: {
              labels: scoreRows.map((s) => s.name || s.studentId),
              datasets: [
                { label: '机器态度评分', data: scoreRows.map((s) => s.machineAttitude), backgroundColor: '#1E40AF' },
                { label: '机器思维评分', data: scoreRows.map((s) => s.machineThinking), backgroundColor: '#7C3AED' },
                { label: '教师态度评分', data: scoreRows.map((s) => s.teacherAttitude), backgroundColor: '#0D9488' },
                { label: '教师思维评分', data: scoreRows.map((s) => s.teacherThinking), backgroundColor: '#F59E0B' },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: { min: 0, max: 100, title: { display: true, text: '分数' } },
              },
            },
          });

          chartInstances.push(chartAttitude, chartThinking, chartDualBar);
        }
      }, 150);

      const statsScoreRows = (typeof scoreRows !== 'undefined' && Array.isArray(scoreRows))
        ? scoreRows
        : (scores || []).map((s) => ({
            studentId: s.studentId ?? '-',
            name: s.name ?? '-',
            machineAttitude: Number(s.machineAttitudeScore ?? s.machineScore ?? 0) || 0,
            machineThinking: Number(s.machineThinkingScore ?? s.machineScore ?? 0) || 0,
            teacherAttitude: Number(s.teacherAttitudeScore ?? s.teacherScore ?? 100) || 100,
            teacherThinking: Number(s.teacherThinkingScore ?? s.teacherScore ?? 100) || 100,
            finalScore: Number(s.finalScore ?? 0) || 0,
          }));

      const calcMean = (arr) => {
        if (!arr.length) return null;
        return arr.reduce((sum, v) => sum + (Number(v) || 0), 0) / arr.length;
      };

      const calcStd = (arr) => {
        if (arr.length < 2) return 0;
        const mean = calcMean(arr);
        const variance = arr.reduce((sum, v) => sum + ((Number(v) || 0) - mean) ** 2, 0) / arr.length;
        return Math.sqrt(variance);
      };

      const calcPearsonWithReason = (rows, xKey, yKey) => {
        if (!rows || rows.length < 2) {
          return { value: null, reason: '样本少于2人，无法计算相关系数' };
        }

        const xs = rows.map((r) => Number(r[xKey]) || 0);
        const ys = rows.map((r) => Number(r[yKey]) || 0);
        const xStd = calcStd(xs);
        const yStd = calcStd(ys);

        if (xStd === 0 && yStd === 0) {
          return { value: null, reason: '机器评分和教师评分都没有变化，无法计算相关系数' };
        }

        if (xStd === 0) {
          return { value: null, reason: '机器评分没有变化，无法计算相关系数' };
        }

        if (yStd === 0) {
          return { value: null, reason: '教师评分没有变化，无法计算相关系数；默认满分时常见' };
        }

        const xMean = calcMean(xs);
        const yMean = calcMean(ys);

        let num = 0;
        let xDen = 0;
        let yDen = 0;

        for (let i = 0; i < xs.length; i++) {
          const xd = xs[i] - xMean;
          const yd = ys[i] - yMean;
          num += xd * yd;
          xDen += xd * xd;
          yDen += yd * yd;
        }

        if (!xDen || !yDen) {
          return { value: null, reason: '数据无有效波动，无法计算相关系数' };
        }

        return {
          value: Math.round((num / Math.sqrt(xDen * yDen)) * 1000) / 1000,
          reason: '已计算',
        };
      };

      const calcMAE = (rows, xKey, yKey) => {
        if (!rows || !rows.length) return 0;
        const sum = rows.reduce((acc, r) => acc + Math.abs((Number(r[yKey]) || 0) - (Number(r[xKey]) || 0)), 0);
        return Math.round((sum / rows.length) * 100) / 100;
      };

      const calcMedian = (values) => {
        const arr = values.map((v) => Number(v) || 0).sort((a, b) => a - b);
        if (!arr.length) return 0;
        const mid = Math.floor(arr.length / 2);
        if (arr.length % 2) return arr[mid];
        return Math.round(((arr[mid - 1] + arr[mid]) / 2) * 100) / 100;
      };

      const attitudePearsonResult = calcPearsonWithReason(statsScoreRows, 'machineAttitude', 'teacherAttitude');
      const thinkingPearsonResult = calcPearsonWithReason(statsScoreRows, 'machineThinking', 'teacherThinking');

      const attitudeMAEStats = calcMAE(statsScoreRows, 'machineAttitude', 'teacherAttitude');
      const thinkingMAEStats = calcMAE(statsScoreRows, 'machineThinking', 'teacherThinking');

      const machineAttitudeMean = calcMean(statsScoreRows.map((s) => s.machineAttitude));
      const machineThinkingMean = calcMean(statsScoreRows.map((s) => s.machineThinking));
      const teacherAttitudeMean = calcMean(statsScoreRows.map((s) => s.teacherAttitude));
      const teacherThinkingMean = calcMean(statsScoreRows.map((s) => s.teacherThinking));
      const finalMedianNew = calcMedian(statsScoreRows.map((s) => s.finalScore));
      const finalStdNew = Math.round(calcStd(statsScoreRows.map((s) => s.finalScore)) * 100) / 100;

      document.getElementById('section-stats').innerHTML = `
        <div class="analysis-card">
          <h4>统计指标</h4>
          <table class="analysis-table">
            <tr><th>指标</th><th>值</th><th>说明</th></tr>
            <tr>
              <td>态度评分 Pearson</td>
              <td>${attitudePearsonResult.value != null ? attitudePearsonResult.value : '—'}</td>
              <td>${attitudePearsonResult.reason}</td>
            </tr>
            <tr>
              <td>思维评分 Pearson</td>
              <td>${thinkingPearsonResult.value != null ? thinkingPearsonResult.value : '—'}</td>
              <td>${thinkingPearsonResult.reason}</td>
            </tr>
            <tr>
              <td>态度评分 MAE</td>
              <td>${attitudeMAEStats}</td>
              <td>教师态度评分与机器态度评分的平均绝对差</td>
            </tr>
            <tr>
              <td>思维评分 MAE</td>
              <td>${thinkingMAEStats}</td>
              <td>教师思维评分与机器思维评分的平均绝对差</td>
            </tr>
            <tr>
              <td>机器态度均分</td>
              <td>${machineAttitudeMean != null ? Math.round(machineAttitudeMean * 100) / 100 : '—'}</td>
              <td>基于发言次数和参与度</td>
            </tr>
            <tr>
              <td>机器思维均分</td>
              <td>${machineThinkingMean != null ? Math.round(machineThinkingMean * 100) / 100 : '—'}</td>
              <td>基于发言逻辑性、医学相关性、推理链和临床决策质量</td>
            </tr>
            <tr>
              <td>教师态度均分</td>
              <td>${teacherAttitudeMean != null ? Math.round(teacherAttitudeMean * 100) / 100 : '—'}</td>
              <td>默认满分，教师只需下调异常学生</td>
            </tr>
            <tr>
              <td>教师思维均分</td>
              <td>${teacherThinkingMean != null ? Math.round(teacherThinkingMean * 100) / 100 : '—'}</td>
              <td>默认满分，教师只需下调逻辑不足学生</td>
            </tr>
            <tr><td>平均提问率</td><td>${stats.askRate ?? 0}%</td><td>学生发言中提问句占比</td></tr>
            <tr><td>AI回应率</td><td>${stats.aiResponseRate ?? 0}%</td><td>提问在3条消息窗口内获AI回应比例</td></tr>
            <tr><td>同学回应率</td><td>${stats.peerResponseRate ?? 0}%</td><td>提问在3条消息窗口内获同学回应比例</td></tr>
            <tr><td>参与度标准差</td><td>${stats.participationStd ?? 0}</td><td>越高表示发言分布越不均衡</td></tr>
            <tr><td>最终成绩中位数</td><td>${finalMedianNew}</td><td>班级中间成绩水平</td></tr>
            <tr><td>最终成绩标准差</td><td>${finalStdNew}</td><td>成绩离散程度</td></tr>
          </table>
          <p style="margin-top:12px;color:#64748B;">
            说明：如果教师评分全部保持默认满分，教师评分没有波动，Pearson、Spearman、CCC 等一致性指标在数学上不能计算。这不是系统错误。等教师对至少一名学生调整分数后，相关指标才有统计意义。
          </p>
        </div>`;
    }


      // LATEST_RECORD_PACKAGE_FRONTEND_PATCH_V1
      // 兜底处理：历史记录中的“下载完整记录包”统一指向服务器最近生成的记录包。
      document.addEventListener('click', function(event) {
        const target = event.target && event.target.closest ? event.target.closest('button, a') : null;
        if (!target) return;

        const text = (target.textContent || '').trim();

        if (text.includes('下载完整记录包')) {
          event.preventDefault();
          event.stopPropagation();
          window.location.href = '/api/latest-record-package/download';
        }
      }, true);

      // 历史记录面板只保留最新课堂记录卡片；如原本只有一个，则不会改变显示。
      function keepOnlyLatestHistoryRecordCard() {
        const candidates = Array.from(document.querySelectorAll('div, li, article, section'))
          .filter((el) => {
            const txt = el.textContent || '';
            return txt.includes('文件数量') && txt.includes('下载完整记录包');
          });

        // 只保留最内层卡片，避免把父容器也当作卡片
        const cards = candidates.filter((el) => !candidates.some((other) => other !== el && el.contains(other)));

        if (cards.length <= 1) return;

        cards.forEach((card, index) => {
          card.style.display = index === 0 ? '' : 'none';
        });
      }

      setInterval(keepOnlyLatestHistoryRecordCard, 800);



      // LATEST_RECORD_PACKAGE_FRONTEND_PATCH_V2
      // 拦截“下载完整记录包”，统一下载最新课堂记录包，避免旧的 /api/records/:id/download 路径冲突。
      document.addEventListener('click', function(event) {
        const target = event.target && event.target.closest ? event.target.closest('button, a') : null;
        if (!target) return;

        const label = (target.textContent || '').trim();

        if (label.includes('下载完整记录包')) {
          event.preventDefault();
          event.stopPropagation();
          window.location.href = '/api/latest-record-package/download';
        }
      }, true);

  </script>
