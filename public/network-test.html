<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical PBL - 网络连接测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .status-box {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid;
        }
        .success {
            background: #f0fdf4;
            border-color: #10b981;
            color: #065f46;
        }
        .error {
            background: #fef2f2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .info {
            background: #eff6ff;
            border-color: #3b82f6;
            color: #1e3a8a;
        }
        .test-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .test-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .test-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }
        .info-grid {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }
        .info-item {
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .info-label {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .info-value {
            color: #2d3748;
            font-family: monospace;
            font-size: 14px;
        }
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .link-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .link-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 网络连接测试</h1>
        <p class="subtitle">测试与 Medical PBL 服务器的连接</p>

        <div id="status" class="status-box info">
            <div id="status-text">准备测试连接...</div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">当前页面地址</div>
                <div class="info-value" id="current-url">加载中...</div>
            </div>
            <div class="info-item">
                <div class="info-label">服务器 API 地址</div>
                <div class="info-value" id="api-url">加载中...</div>
            </div>
            <div class="info-item">
                <div class="info-label">浏览器</div>
                <div class="info-value" id="browser-info">加载中...</div>
            </div>
        </div>

        <button class="test-btn" id="test-btn" onclick="testConnection()">
            开始测试连接
        </button>

        <div id="success-link" style="display: none; text-align: center;">
            <a href="/" class="link-btn">✅ 连接成功！前往登录页面</a>
        </div>
    </div>

    <script>
        // 页面加载时显示信息
        window.onload = function() {
            document.getElementById('current-url').textContent = window.location.href;
            document.getElementById('api-url').textContent = window.location.origin + '/api/system/health';
            document.getElementById('browser-info').textContent = navigator.userAgent.split('(')[0].trim();
            
            // 自动测试连接
            setTimeout(testConnection, 500);
        };

        async function testConnection() {
            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('status-text');
            const testBtn = document.getElementById('test-btn');
            const successLink = document.getElementById('success-link');

            // 开始测试
            testBtn.disabled = true;
            statusDiv.className = 'status-box info';
            statusText.innerHTML = '<div class="spinner"></div>正在测试连接...';
            successLink.style.display = 'none';

            try {
                const response = await fetch('/api/system/health', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    const data = await response.json();
                    statusDiv.className = 'status-box success';
                    statusText.innerHTML = `
                        <div style="font-size: 24px; margin-bottom: 10px;">✅ 连接成功！</div>
                        <div>服务器状态: ${data.status || 'ok'}</div>
                        <div>服务器时间: ${data.time || '未知'}</div>
                        ${data.aiEnabled ? '<div style="margin-top: 10px;">✅ AI 功能已启用</div>' : ''}
                    `;
                    successLink.style.display = 'block';
                    testBtn.textContent = '重新测试';
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                statusDiv.className = 'status-box error';
                statusText.innerHTML = `
                    <div style="font-size: 24px; margin-bottom: 10px;">❌ 连接失败</div>
                    <div style="margin-top: 10px;"><strong>错误信息:</strong></div>
                    <div style="margin-top: 5px;">${error.message}</div>
                    <div style="margin-top: 15px;"><strong>可能原因:</strong></div>
                    <ul style="margin-left: 20px; margin-top: 5px;">
                        <li>服务器未启动</li>
                        <li>防火墙阻止了连接</li>
                        <li>IP 地址输入错误</li>
                        <li>不在同一局域网内</li>
                    </ul>
                    <div style="margin-top: 15px;"><strong>解决方法:</strong></div>
                    <ul style="margin-left: 20px; margin-top: 5px;">
                        <li>确认服务器已启动 (node server.js)</li>
                        <li>运行 network-diagnostic.ps1 检查配置</li>
                        <li>添加防火墙规则允许端口 3000</li>
                    </ul>
                `;
                testBtn.textContent = '重试';
            } finally {
                testBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
