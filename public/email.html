<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>查看复制邮箱</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #0f172a;
    }
    .card {
      width: min(92vw, 520px);
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.16);
      border: 1px solid rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 26px;
    }
    .email-box {
      margin: 18px 0;
      padding: 16px;
      border-radius: 16px;
      background: #f1f5f9;
    }
    .email {
      width: 100%;
      box-sizing: border-box;
      border: 0;
      outline: none;
      background: transparent;
      color: #020617;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      word-break: break-all;
    }
    button, a {
      display: inline-block;
      margin: 6px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 0;
      background: #2563eb;
      color: white;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    a {
      background: #0f766e;
    }
    .tip {
      margin-top: 14px;
      color: #475569;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>查看复制邮箱</h1>
    <p>我的邮箱是：</p>

    <div class="email-box">
      <input
        class="email"
        id="emailText"
        value="SamuelGarcia7329@outlook.com"
        readonly
        aria-label="邮箱地址"
      />
    </div>

    <button type="button" id="copyBtn">复制邮箱</button>
    <a href="mailto:SamuelGarcia7329@outlook.com">链接式发送邮件</a>

    <p class="tip" id="copyTip">也可以直接选中上面的邮箱复制。</p>
  </main>

  <script>
    const email = 'SamuelGarcia7329@outlook.com';
    const btn = document.getElementById('copyBtn');
    const input = document.getElementById('emailText');
    const tip = document.getElementById('copyTip');

    function selectEmail() {
      input.focus();
      input.select();
      input.setSelectionRange(0, input.value.length);
    }

    async function copyEmail() {
      selectEmail();

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(email);
          tip.textContent = '已复制邮箱：' + email;
          return;
        }
      } catch (err) {
        // 继续尝试兼容复制
      }

      try {
        const ok = document.execCommand('copy');
        if (ok) {
          tip.textContent = '已复制邮箱：' + email;
          return;
        }
      } catch (err) {
        // 继续进入手动复制提示
      }

      tip.textContent = '浏览器限制了自动复制，已帮你选中邮箱，请按 Ctrl+C 手动复制。';
    }

    btn.addEventListener('click', copyEmail);

    input.addEventListener('click', () => {
      selectEmail();
      tip.textContent = '邮箱已选中，可以按 Ctrl+C 复制。';
    });
  </script>
</body>
</html>
