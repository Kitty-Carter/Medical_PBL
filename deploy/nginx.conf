# Medical_PBL Nginx 配置模板
# 适用场景：Nginx 作为反向代理，转发请求到 Node.js 后端（默认端口 3000）
# 放置路径：/etc/nginx/sites-available/medical-pbl
# 启用方式：ln -s /etc/nginx/sites-available/medical-pbl /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名或 IP

    # 日志配置
    access_log /var/log/nginx/medical-pbl-access.log;
    error_log /var/log/nginx/medical-pbl-error.log;

    # 上传文件大小限制
    client_max_body_size 50M;

    # 静态资源直接由 Nginx 提供
    location /css/ {
        alias /opt/medical-pbl/current/public/css/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        alias /opt/medical-pbl/current/public/js/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        alias /opt/medical-pbl/current/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /opt/medical-pbl/current/uploads/;
        expires 7d;
    }

    # 反向代理到 Node.js 后端
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置（AI 请求可能耗时较长）
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

